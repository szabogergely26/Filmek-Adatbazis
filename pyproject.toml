[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",    # Pycodestyle
    "W",    # Warning
    "F",    # Pyflakes (legfontosabb: nem létező változó, hibás import)
    "I",    # Import rendezés
    "UP",   # Pyupgrade – Python új szintaxis javaslatok
]

ignore = [
    "E401", # több import egy sorban – Qt miatt néha praktikus
]

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint.isort]
known-first-party = [
    "config",
    "db",
    "dialogs",
    "main_window",
    "themes",
    "utils",
    "views",
    "wizard",
]
